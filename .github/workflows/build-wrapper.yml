name: Build f2b-wrapper

on:
  workflow_dispatch:

env:
  CI: true

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # =========================
      # BUILD (Ubuntu 18.04)
      # =========================
      - name: Build f2b-wrapper in Ubuntu 18.04 container
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive

            # Fix for Ubuntu 18.04 EOL
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic main restricted universe multiverse' > /etc/apt/sources.list
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic-updates main restricted universe multiverse' >> /etc/apt/sources.list
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic-security main restricted universe multiverse' >> /etc/apt/sources.list

            apt-get update -qq || (sleep 2 && apt-get update -qq)

            apt-get install -y --no-install-recommends \
              build-essential

            echo ''
            echo '========================================'
            echo ' Building f2b-wrapper'
            echo ' Target: Ubuntu 18.04'
            echo '========================================'
            echo ''

            gcc -O2 -Wall -Wextra \
              tools/f2b-wrapper.c \
              -o f2b-wrapper

            chmod +x f2b-wrapper

            echo ''
            echo '[OK] Build complete'
          "

      # =========================
      # DEBUG
      # =========================
      - name: Debug binary
        run: |
          echo '=== ls ==='
          ls -l

          echo '=== file ==='
          file f2b-wrapper || true

          echo '=== size ==='
          du -h f2b-wrapper

      - name: Runtime check in Ubuntu 18.04
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            echo '=== ldd ==='
            ldd ./f2b-wrapper

            if ldd ./f2b-wrapper | grep -q 'not found'; then
              echo 'ERROR: missing shared libraries'
              exit 1
            fi

            echo '=== runtime test ==='
            ./f2b-wrapper 2>&1 || true
          "

      # =========================
      # VALIDATION
      # =========================
      - name: Ensure binary exists
        run: |
          if [ ! -f f2b-wrapper ]; then
            echo 'ERROR: f2b-wrapper not built'
            exit 1
          fi

      - name: Run without arguments (should show usage)
        run: |
          ./f2b-wrapper 2>&1 || true

      - name: Run with invalid command (should fail)
        run: |
          if ./f2b-wrapper invalid_cmd 2>/dev/null; then
            echo 'ERROR: should have failed'
            exit 1
          else
            echo 'OK: correctly rejected invalid command'
          fi

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: f2b-wrapper
          path: f2b-wrapper
