name: Build tg-bot (static, GCC 9)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      CI: true
      VER_OPENSSL: "3.0.20"
      VER_CARES: "1.34.6"
      VER_CURL: "8.20.0"
      VER_CJSON: "1.7.19"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # =========================
      # CACHE
      # =========================
      - name: Cache static dependencies
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: deps
          key: static-deps-gcc9-openssl${{ env.VER_OPENSSL }}-cares${{ env.VER_CARES }}-curl${{ env.VER_CURL }}-cjson${{ env.VER_CJSON }}

      # =========================
      # BUILD (Ubuntu 18.04 + GCC 9)
      # =========================
      - name: Build in Ubuntu 18.04 container (GCC 9)
        run: |
          mkdir -p deps

          docker run --rm \
            -v $PWD:/app \
            -v $PWD/deps:/deps \
            -w /app \
            -e BUILD_NUMBER=${{ github.run_number }} \
            -e VER_OPENSSL=${{ env.VER_OPENSSL }} \
            -e VER_CARES=${{ env.VER_CARES }} \
            -e VER_CURL=${{ env.VER_CURL }} \
            -e VER_CJSON=${{ env.VER_CJSON }} \
            -e CACHE_HIT=${{ steps.cache-deps.outputs.cache-hit }} \
            ubuntu:18.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive

            # 🔥 FIX for Ubuntu 18.04 EOL
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic main restricted universe multiverse' > /etc/apt/sources.list
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic-updates main restricted universe multiverse' >> /etc/apt/sources.list
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic-security main restricted universe multiverse' >> /etc/apt/sources.list

            apt-get update -qq || (sleep 2 && apt-get update -qq)

            # ===== Install GCC 9 from PPA (keeps old glibc 2.27) =====
            echo '[INFO] Installing GCC 9...'
            apt-get install -y --no-install-recommends software-properties-common
            add-apt-repository ppa:ubuntu-toolchain-r/test -y
            apt-get update -qq
            apt-get install -y --no-install-recommends gcc-9 g++-9

            # ===== Install remaining build dependencies =====
            # Install build-essential BEFORE update-alternatives — it pulls in
            # gcc-7 and resets the gcc symlink. We fix it right after.
            apt-get install -y --no-install-recommends --fix-missing \
              build-essential \
              ca-certificates \
              zlib1g-dev \
              git \
              cmake \
              wget \
              xz-utils \
              perl

            update-ca-certificates

            # ===== Register GCC 9 as default AFTER build-essential =====
            # build-essential depends on gcc which pulls gcc-7 and may reset
            # the symlink. Re-register GCC 9 here to guarantee it wins.
            update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 90 --slave /usr/bin/g++ g++ /usr/bin/g++-9
            update-alternatives --set gcc /usr/bin/gcc-9

            # Export CC/CXX so all ./configure-based builds (OpenSSL, c-ares,
            # curl) and direct gcc calls use GCC 9 explicitly.
            export CC=/usr/bin/gcc-9
            export CXX=/usr/bin/g++-9

            echo '[INFO] Compiler version:'
            gcc --version | head -1
            GCC_VER=\$(gcc --version | head -1 | awk '{print \$NF}')
            echo \"[INFO] GCC_VER=\${GCC_VER}\"

            # ===== generate build info =====
            git config --global --add safe.directory /app
            BUILD_COMMIT=\$(git -C /app rev-parse --short HEAD 2>/dev/null || echo 'unknown')
            BUILD_DATE=\$(date -u '+%Y-%m-%d %H:%M:%S UTC')

            echo \"#ifndef BUILD_INFO_H\"                                > /app/include/build_info.h
            echo \"#define BUILD_INFO_H\"                               >> /app/include/build_info.h
            echo \"#define TG_BUILD_COMMIT \\\"\${BUILD_COMMIT}\\\"\"  >> /app/include/build_info.h
            echo \"#define TG_BUILD_DATE \\\"\${BUILD_DATE}\\\"\"      >> /app/include/build_info.h
            echo \"#define TG_BUILD_NUMBER \\\"\${BUILD_NUMBER}\\\"\"  >> /app/include/build_info.h
            echo \"#define TG_BUILD_COMPILER \\\"GCC \${GCC_VER}\\\"\" >> /app/include/build_info.h
            echo \"#endif\"                                             >> /app/include/build_info.h
            echo \"[INFO] Build info: commit=\${BUILD_COMMIT} date=\${BUILD_DATE} build=\${BUILD_NUMBER} compiler=GCC \${GCC_VER}\"

            if [ \"\${CACHE_HIT}\" = \"true\" ]; then
              echo '[INFO] Cache hit — skipping dependency builds'
            else
              echo '[INFO] Cache miss — building all dependencies'

              # ===== build static openssl =====
              echo ''
              echo '==============================================================='
              echo \" Building OpenSSL \${VER_OPENSSL} (static, GCC \${GCC_VER})\"
              echo '==============================================================='
              echo ''

              cd /tmp
              wget https://www.openssl.org/source/openssl-\${VER_OPENSSL}.tar.gz
              tar -xzf openssl-\${VER_OPENSSL}.tar.gz
              cd openssl-\${VER_OPENSSL}
              ./Configure linux-x86_64 no-shared \
                --prefix=/deps/openssl \
                --openssldir=/deps/openssl/ssl
              make -j\$(nproc)
              make install
              echo \"[OK] OpenSSL \${VER_OPENSSL} built\"

              # ===== build static c-ares =====
              echo ''
              echo '============================================================'
              echo \" Building c-ares \${VER_CARES} (static, GCC \${GCC_VER})\"
              echo '============================================================'
              echo ''

              cd /tmp
              wget https://github.com/c-ares/c-ares/releases/download/v\${VER_CARES}/c-ares-\${VER_CARES}.tar.gz
              tar -xzf c-ares-\${VER_CARES}.tar.gz
              cd c-ares-\${VER_CARES}
              ./configure \
                --enable-static \
                --disable-shared \
                --prefix=/deps/cares \
                CFLAGS='-Wno-conversion -Wno-format-truncation -Wno-unused-result -Wno-sign-conversion'
              make -j\$(nproc)
              make install
              echo \"[OK] c-ares \${VER_CARES} built\"

              # ===== build static curl =====
              echo ''
              echo '========================================================='
              echo \" Building curl \${VER_CURL} (static, GCC \${GCC_VER})\"
              echo '========================================================='
              echo ''

              cd /tmp
              wget https://curl.se/download/curl-\${VER_CURL}.tar.xz
              tar -xf curl-\${VER_CURL}.tar.xz
              cd curl-\${VER_CURL}
              export PKG_CONFIG_PATH=/deps/openssl/lib64/pkgconfig:/deps/cares/lib/pkgconfig:\$PKG_CONFIG_PATH
              ./configure \
                --disable-shared \
                --enable-static \
                --enable-ares=/deps/cares \
                --without-libpsl \
                --disable-ldap \
                --without-libidn2 \
                --with-openssl=/deps/openssl \
                --with-ca-path=/etc/ssl/certs \
                --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
                --prefix=/deps/curl \
                LDFLAGS='-L/deps/openssl/lib64 -L/deps/cares/lib' \
                CPPFLAGS='-I/deps/openssl/include -I/deps/cares/include'
              make -j\$(nproc)
              make install
              echo \"[OK] curl \${VER_CURL} built\"

              # ===== build cJSON =====
              echo ''
              echo '==========================================================='
              echo \" Building cJSON \${VER_CJSON} (static, GCC \${GCC_VER})\"
              echo '==========================================================='
              echo ''

              cd /tmp
              wget https://github.com/DaveGamble/cJSON/archive/refs/tags/v\${VER_CJSON}.tar.gz -O cJSON.tar.gz
              tar -xzf cJSON.tar.gz
              mv cJSON-\${VER_CJSON} cJSON
              cd cJSON
              mkdir build && cd build
              cmake .. \
                -DCMAKE_C_COMPILER=/usr/bin/gcc-9 \
                -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DCMAKE_INSTALL_PREFIX=/deps/cjson
              make
              make install
              echo \"[OK] cJSON \${VER_CJSON} built\"

            fi

            # ===== build f2b-wrapper =====
            cd /app
            echo ''
            echo '=============================================='
            echo \" Building f2b-wrapper (GCC \${GCC_VER})\"
            echo '=============================================='
            echo ''
            gcc -O2 -Wall -Wextra -std=c11 tools/f2b-wrapper.c -o f2b-wrapper
            echo '[INFO] Stripping f2b-wrapper binary'
            strip f2b-wrapper || true
            chmod +x f2b-wrapper
            cp f2b-wrapper /usr/local/bin/f2b-wrapper
            echo '[OK] f2b-wrapper built'

            # ===== build tg-bot =====
            cd /app
            echo ''
            echo '======================================================'
            echo \" Building tg-bot (static, GCC \${GCC_VER})\"
            echo \"  OpenSSL \${VER_OPENSSL}, c-ares \${VER_CARES},\"
            echo \"  curl \${VER_CURL}, cJSON \${VER_CJSON}\"
            echo '======================================================'
            echo ''

            make LDFLAGS='-L/deps/curl/lib -L/deps/openssl/lib64 -L/deps/cares/lib -L/deps/cjson/lib -Wl,-Bstatic -lcjson -lcurl -lssl -lcrypto -lcares -Wl,-Bdynamic -lz -lpthread -ldl' \
                 EXTRA_CFLAGS='-I/deps/curl/include -I/deps/openssl/include -I/deps/cares/include -I/deps/cjson/include'

            chmod +x tg-bot || true

            echo '[INFO] Stripping tg-bot binary'
            strip tg-bot || true

            echo \"[OK] tg-bot built (GCC \${GCC_VER})\"

            echo '[DEBUG] contents of /app:'
            ls -l /app
          "

      # =========================
      # DEBUG
      # =========================
      - name: Debug build output
        run: |
          echo '=== ls ==='
          ls -l

          echo '=== file ==='
          file tg-bot || true

          echo '=== size ==='
          du -h tg-bot

      - name: Runtime check in Ubuntu 18.04
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive

            apt-get update -qq
            apt-get install -y zlib1g

            echo '=== ldd ==='
            ldd ./tg-bot

            if ldd ./tg-bot | grep -q 'not found'; then
              echo 'ERROR: missing shared libraries'
              exit 1
            fi

            echo '=== runtime test ==='
            ./tg-bot --version
          "

      # =========================
      # VALIDATION
      # =========================
      - name: Ensure binary exists
        run: |
          if [ ! -f tg-bot ]; then
            echo 'ERROR: tg-bot not built'
            exit 1
          fi

      # =========================
      # SMOKE TESTS
      # =========================
      - name: Run version
        run: ./tg-bot --version

      - name: Run help
        run: ./tg-bot --help

      - name: Run without config (should fail)
        run: |
          if ./tg-bot 2>/dev/null; then
            echo 'ERROR: bot should not start without config'
            exit 1
          else
            echo 'OK'
          fi

      - name: Run with fake config
        run: |
          rm -f test.conf test.log
          echo 'TOKEN=123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11' >> test.conf
          echo 'CHAT_ID=123456789'                                 >> test.conf
          echo 'LOG_FILE=./test.log'                               >> test.conf
          echo 'TOKEN_TTL=10'                                      >> test.conf
          echo 'SUDO_PATH=/usr/bin/sudo'                           >> test.conf
          echo 'SYSTEMCTL_PATH=/bin/systemctl'                     >> test.conf
          echo 'JOURNALCTL_PATH=/bin/journalctl'                   >> test.conf
          echo 'F2B_WRAPPER_PATH=/usr/local/bin/f2b-wrapper'       >> test.conf
          echo 'UPLOAD_ENABLED=yes'                                >> test.conf
          echo 'UPLOAD_DIR=/tmp/tg-bot-uploads'                    >> test.conf
          echo "=== test.conf ==="
          cat test.conf
          echo "=== running bot (stdout/stderr switched to test.log after config load) ==="
          timeout 3s ./tg-bot -c test.conf || true
          echo "=== test.log contents ==="
          cat test.log 2>/dev/null || echo "ERROR: test.log not created"

      - name: Check log file created
        run: |
          if [ ! -f test.log ]; then
            echo 'ERROR: log file not created'
            exit 1
          else
            echo 'OK: log file exists'
          fi

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: tg-bot-static-gcc9
          path: |
            tg-bot
            f2b-wrapper
