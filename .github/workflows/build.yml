name: Build tg-bot

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-18.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # =========================
      # BUILD (Ubuntu 18.04)
      # =========================
      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e

            apt update
            apt install -y \
              build-essential \
              libcurl4-openssl-dev \
              git \
              cmake

            # ===== build cJSON =====
            cd /tmp
            git clone --depth 1 --branch v1.7.15 https://github.com/DaveGamble/cJSON.git
            cd cJSON
            mkdir build && cd build
            cmake ..
            make
            make install
            ldconfig

            # ===== build tg-bot =====
            cd /app

            make LDFLAGS='-Wl,-rpath,\\\$ORIGIN'

            # копируем .so рядом
            cp /usr/local/lib/libcjson.so* /app/

            echo '[OK] build complete'
          "

      # =========================
      # DEBUG
      # =========================
      - name: List files
        run: |
          ls -l

      - name: Check dependencies
        run: |
          ldd tg-bot || true

      # =========================
      # SMOKE TESTS
      # =========================
      - name: Run version (with local libs)
        run: |
          LD_LIBRARY_PATH=. ./tg-bot --version

      - name: Run help
        run: |
          LD_LIBRARY_PATH=. ./tg-bot --help

      - name: Run without config (should fail)
        run: |
          if LD_LIBRARY_PATH=. ./tg-bot 2>/dev/null; then
            echo "ERROR: bot should not start without config"
            exit 1
          else
            echo "OK"
          fi

      - name: Run with fake config
        run: |
          printf "TOKEN=TEST\nCHAT_ID=123\nLOG_FILE=./test.log\nPOLL_TIMEOUT=1\nTOKEN_TTL=10\n" > test.conf

          timeout 3s env LD_LIBRARY_PATH=. ./tg-bot -c test.conf || true

      - name: Check log file created
        run: |
          if [ ! -f test.log ]; then
            echo "ERROR: log file not created"
            exit 1
          else
            echo "OK: log file exists"
          fi

      - name: Check log file not empty
        run: |
          if [ ! -s test.log ]; then
            echo "ERROR: log file is empty"
            exit 1
          else
            echo "OK: log file has content"
          fi

      - name: Show log content (debug)
        run: |
          echo "==== LOG ===="
          cat test.log || true

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: tg-bot
        path: tg-bot

      - name: Upload libs
      uses: actions/upload-artifact@v4
      with:
        name: tg-bot-libs
        path: libcjson.so*
