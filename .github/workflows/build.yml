name: Build tg-bot

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # =========================
      # BUILD (Ubuntu 18.04)
      # =========================
      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash <<'EOF'
          set -e

          apt update
          apt install -y \
            build-essential \
            libcurl4-openssl-dev \
            git \
            cmake

          # ===== build cJSON =====
          cd /tmp
          git clone --depth 1 --branch v1.7.15 https://github.com/DaveGamble/cJSON.git
          cd cJSON
          mkdir build && cd build
          cmake ..
          make
          make install
          ldconfig

          # ===== build tg-bot =====
          cd /app

          make LDFLAGS='-Wl,-rpath,$ORIGIN'

          # копируем .so рядом
          cp /usr/local/lib/libcjson.so* /app/

          echo "[OK] build complete"
          EOF

      # =========================
      # DEBUG
      # =========================
      - name: List files
        run: ls -l

      - name: Check dependencies
        run: ldd tg-bot || true

      # =========================
      # SMOKE TESTS
      # =========================
      - name: Run version
        run: LD_LIBRARY_PATH=. ./tg-bot --version

      - name: Run help
        run: LD_LIBRARY_PATH=. ./tg-bot --help

      - name: Run without config (should fail)
        run: |
          if LD_LIBRARY_PATH=. ./tg-bot 2>/dev/null; then
            echo "ERROR: bot should not start without config"
            exit 1
          else
            echo "OK"
          fi

      - name: Run with fake config
        run: |
          echo "TOKEN=TEST" >> test.conf
          echo "CHAT_ID=123" >> test.conf
          echo "LOG_FILE=./test.log" >> test.conf
          echo "POLL_TIMEOUT=1" >> test.conf
          echo "TOKEN_TTL=10" >> test.conf

          timeout 3s env LD_LIBRARY_PATH=. ./tg-bot -c test.conf || true
          
      - name: Check log file created
        run: |
          if [ ! -f test.log ]; then
            echo "ERROR: log file not created"
            exit 1
          else
            echo "OK: log file exists"
          fi

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tg-bot
          path: tg-bot

      - name: Upload libs
        uses: actions/upload-artifact@v4
        with:
          name: tg-bot-libs
          path: libcjson.so*
