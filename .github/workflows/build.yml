name: Build tg-bot

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            apt update &&
            apt install -y build-essential libcurl4-openssl-dev libcjson-dev &&
            make
          "

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tg-bot
          path: tg-bot
