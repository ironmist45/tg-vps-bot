name: Build tg-bot

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # =========================
      # BUILD (Ubuntu 18.04)
      # =========================
      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e

            apt update
            apt install -y \
              build-essential \
              libcurl4-openssl-dev \
              git \
              cmake

            # ===== build cJSON =====
            cd /tmp
            git clone --depth 1 --branch v1.7.15 https://github.com/DaveGamble/cJSON.git
            cd cJSON
            mkdir build && cd build
            cmake ..
            make
            make install
            ldconfig

            # ===== build tg-bot =====
            cd /app

            # 🔥 добавляем RPATH прямо при сборке
            make LDFLAGS='-Wl,-rpath,\\\$ORIGIN'

            # копируем .so рядом
            cp /usr/local/lib/libcjson.so* /app/

            echo '[OK] build complete'
          "

      # =========================
      # DEBUG
      # =========================
      - name: List files
        run: |
          ls -l

      - name: Check dependencies
        run: |
          ldd tg-bot || true

      # =========================
      # SMOKE TESTS
      # =========================
      - name: Run version (with local libs)
        run: |
          LD_LIBRARY_PATH=. ./tg-bot --version

      - name: Run help
        run: |
          LD_LIBRARY_PATH=. ./tg-bot --help

      - name: Run without config (should fail)
        run: |
          if LD_LIBRARY_PATH=. ./tg-bot 2>/dev/null; then
            echo "ERROR: bot should not start without config"
            exit 1
          else
            echo "OK"
          fi

      - name: Run with fake config
        run: |
          cat <<EOF > test.conf
          token=TEST
          chat_id=123
          log_file=./test.log
          poll_timeout=1
          EOF

          timeout 3s LD_LIBRARY_PATH=. ./tg-bot -c test.conf || true

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tg-bot
          path: |
            tg-bot
            libcjson.so*
