name: Build tg-bot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # BUILD (Ubuntu 18.04)
      # =========================
      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive

            # 🔥 FIX for Ubuntu 18.04 EOL
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic main restricted universe multiverse' > /etc/apt/sources.list
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic-updates main restricted universe multiverse' >> /etc/apt/sources.list
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic-security main restricted universe multiverse' >> /etc/apt/sources.list
            
            apt-get update -qq || (sleep 2 && apt-get update -qq)

            apt-get install -y --no-install-recommends --fix-missing \
              build-essential \
              ca-certificates \
              libssl-dev \
              zlib1g-dev \
              git \
              cmake \
              wget \
              xz-utils

            update-ca-certificates

            # ===== generate build info =====
            BUILD_COMMIT=\$(cd /app && git rev-parse --short HEAD 2>/dev/null || echo 'unknown')
            BUILD_DATE=\$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            
            echo \"#ifndef BUILD_INFO_H\" > /app/include/build_info.h
            echo \"#define BUILD_INFO_H\" >> /app/include/build_info.h
            echo \"#define TG_BUILD_COMMIT \\\"\${BUILD_COMMIT}\\\"\" >> /app/include/build_info.h
            echo \"#define TG_BUILD_DATE \\\"\${BUILD_DATE}\\\"\" >> /app/include/build_info.h
            echo \"#endif\" >> /app/include/build_info.h
            echo '[INFO] Build info generated: commit='\"\${BUILD_COMMIT}\"' date='\"\${BUILD_DATE}\"

            # ===== build static curl 8.7.1 =====
            cd /tmp
            wget https://curl.se/download/curl-8.7.1.tar.xz
            tar -xf curl-8.7.1.tar.xz
            cd curl-8.7.1
            
            ./configure \
              --disable-shared \
              --enable-static \
              --with-openssl \
              --prefix=/usr/local/curl-static
            
            make -j\$(nproc)
            make install

            # ===== build cJSON (STATIC) =====
            cd /tmp
            git clone --depth 1 --branch v1.7.15 https://github.com/DaveGamble/cJSON.git
            cd cJSON
            mkdir build && cd build

            cmake .. \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON

            make
            make install
            ldconfig

            # ===== build tg-bot =====
            cd /app

            # 👇 Статическая линковка curl и cjson
            make LDFLAGS='-L/usr/local/curl-static/lib -Wl,-Bstatic -lcjson -lcurl -Wl,-Bdynamic -lssl -lcrypto -lz -lpthread' \
                 CFLAGS='-Iinclude -I/usr/local/curl-static/include'

            chmod +x tg-bot || true

            echo '[OK] build complete'

            echo '[DEBUG] contents of /app:'
            ls -l /app
          "

      # ==================================================================================
      # DEBUG
      # ==================================================================================
      - name: Debug build output
        run: |
          echo '=== ls ==='
          ls -l

          echo '=== file ==='
          file tg-bot || true

          echo '=== size ==='
          du -h tg-bot

      - name: Runtime check in Ubuntu 18.04
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive

            apt-get update -qq
            apt-get install -y libssl1.1 zlib1g

            echo '=== ldd ==='
            ldd ./tg-bot

            if ldd ./tg-bot | grep -q 'not found'; then
              echo 'ERROR: missing shared libraries'
              exit 1
            fi

            echo '=== runtime test ==='
            ./tg-bot --version
          "
          
      # =========================
      # VALIDATION
      # =========================
      - name: Ensure binary exists
        run: |
          if [ ! -f tg-bot ]; then
            echo \"ERROR: tg-bot not built\"
            exit 1
          fi

      # =========================
      # SMOKE TESTS
      # =========================
      - name: Run version
        run: ./tg-bot --version

      - name: Run help
        run: ./tg-bot --help

      - name: Run without config (should fail)
        run: |
          if ./tg-bot 2>/dev/null; then
            echo \"ERROR: bot should not start without config\"
            exit 1
          else
            echo \"OK\"
          fi

      - name: Run with fake config
        run: |
          rm -f test.conf test.log

          echo \"TOKEN=TEST\" >> test.conf
          echo \"CHAT_ID=123\" >> test.conf
          echo \"LOG_FILE=./test.log\" >> test.conf
          echo \"POLL_TIMEOUT=1\" >> test.conf
          echo \"TOKEN_TTL=10\" >> test.conf

          timeout 3s ./tg-bot -c test.conf || echo 'bot exited (expected or timeout)'

      - name: Check log file created
        run: |
          if [ ! -f test.log ]; then
            echo \"ERROR: log file not created\"
            exit 1
          else
            echo \"OK: log file exists\"
          fi

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: tg-bot
          path: tg-bot
