name: Build tg-bot

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # =========================
      # BUILD (Ubuntu 18.04)
      # =========================
      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e

            apt update
            apt install -y \
              build-essential \
              libcurl4-openssl-dev \
              git \
              cmake

            # ===== build cJSON =====
            cd /tmp
            git clone --depth 1 --branch v1.7.15 https://github.com/DaveGamble/cJSON.git
            cd cJSON
            mkdir build && cd build
            cmake .. -DBUILD_SHARED_LIBS=OFF
            make
            make install
            ldconfig

            # ===== build tg-bot =====
            cd /app

            make LDFLAGS='-Wl,-rpath,\$ORIGIN'

            # делаем исполняемым (на всякий случай)
            chmod +x tg-bot || true

            # копируем .so рядом
            # cp /usr/local/lib/libcjson.so* /app/ || true

            echo '[OK] build complete'

            echo '[DEBUG] contents of /app:'
            ls -l /app
          "

      # =========================
      # DEBUG
      # =========================
      - name: Debug build output
        run: |
          echo "=== ls ==="
          ls -l

          echo "=== file ==="
          file tg-bot || true

          echo "=== ldd ==="
          ldd tg-bot || true

      # =========================
      # VALIDATION
      # =========================
      - name: Ensure binary exists
        run: |
          if [ ! -f tg-bot ]; then
            echo "ERROR: tg-bot not built"
            exit 1
          fi

      # =========================
      # SMOKE TESTS
      # =========================
      - name: Run version
        run: env LD_LIBRARY_PATH=. ./tg-bot --version

      - name: Run help
        run: env LD_LIBRARY_PATH=. ./tg-bot --help

      - name: Run without config (should fail)
        run: |
          if env LD_LIBRARY_PATH=. ./tg-bot 2>/dev/null; then
            echo "ERROR: bot should not start without config"
            exit 1
          else
            echo "OK"
          fi

      - name: Run with fake config
        run: |
          rm -f test.conf test.log

          echo "TOKEN=TEST" >> test.conf
          echo "CHAT_ID=123" >> test.conf
          echo "LOG_FILE=./test.log" >> test.conf
          echo "POLL_TIMEOUT=1" >> test.conf
          echo "TOKEN_TTL=10" >> test.conf

          timeout 3s env LD_LIBRARY_PATH=. ./tg-bot -c test.conf || true

      - name: Check log file created
        run: |
          if [ ! -f test.log ]; then
            echo "ERROR: log file not created"
            exit 1
          else
            echo "OK: log file exists"
          fi

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tg-bot
          path: tg-bot

      - name: Upload libs
        uses: actions/upload-artifact@v4
        with:
          name: tg-bot-libs
          path: libcjson.so*
