name: Check dependency updates

on:
  schedule:
    - cron: '0 9 * * 1'     # Every Monday at 09:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  check:
    runs-on: ubuntu-22.04
    permissions:
      issues: write

    env:
      VER_OPENSSL: "3.0.20"
      VER_CARES: "1.34.6"
      VER_CURL: "8.20.0"
      VER_CJSON: "1.7.19"

    steps:
      - name: Check for dependency updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPDATES=""

          check_version() {
            local name="$1"
            local repo="$2"
            local current="$3"
            local strip_prefix="$4"

            latest=$(curl -sf "https://api.github.com/repos/${repo}/releases/latest" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              | grep '"tag_name"' \
              | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')

            if [ -z "$latest" ]; then
              echo "[WARN] Could not fetch latest version for ${name}"
              return
            fi

            # Strip prefix (e.g. "v", "curl-", "openssl-")
            # Normalize separators: curl uses underscores (curl-8_20_0)
            if [ -n "$strip_prefix" ]; then
              latest_ver=$(echo "$latest" | sed "s/^${strip_prefix}//" | tr '_' '.')
            else
              latest_ver=$(echo "$latest" | tr '_' '.')
            fi

            echo "[INFO] ${name}: current=${current} latest=${latest_ver}"

            if [ "$latest_ver" != "$current" ]; then
              UPDATES="${UPDATES}\n- **${name}**: \`${current}\` → \`${latest_ver}\` (tag: \`${latest}\`)"
            fi
          }

          # OpenSSL: track 3.0.x LTS branch only (not 4.x)
          latest_openssl=$(curl -sf "https://api.github.com/repos/openssl/openssl/releases" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            | grep '"tag_name"' \
            | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/' \
            | grep '^openssl-3\.0\.' \
            | head -1 \
            | sed 's/^openssl-//')

          if [ -z "$latest_openssl" ]; then
            echo "[WARN] Could not fetch latest OpenSSL 3.0.x version"
          else
            echo "[INFO] OpenSSL: current=${VER_OPENSSL} latest=${latest_openssl}"
            if [ "$latest_openssl" != "$VER_OPENSSL" ]; then
              UPDATES="${UPDATES}\n- **OpenSSL** (3.0.x LTS): \`${VER_OPENSSL}\` → \`${latest_openssl}\`"
            fi
          fi

          check_version "c-ares"  "c-ares/c-ares"    "$VER_CARES" "v"
          check_version "curl"    "curl/curl"         "$VER_CURL"  "curl-"
          check_version "cJSON"   "DaveGamble/cJSON"  "$VER_CJSON" "v"

          if [ -z "$UPDATES" ]; then
            echo "[OK] All dependencies are up to date"
            exit 0
          fi

          echo "[INFO] Updates found, creating GitHub Issue"

          BODY="## Dependency updates available\n\nThe following static dependencies have newer versions available:\n${UPDATES}\n\n### Next steps\n1. Review changelog for breaking changes\n2. Update version in \`build-static.yml\` \`env:\` section\n3. Run build and verify\n\n_This issue was created automatically by the check-deps workflow._"

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "deps: new versions available for static dependencies" \
            --body "$(printf "$BODY")" \
            --label "dependencies" || \
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "deps: new versions available for static dependencies" \
            --body "$(printf "$BODY")"