name: Build tg-bot (static) - OpenSSL 3.0.15, Curl 8.7.1, cJSON 1.7.15

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # BUILD (Ubuntu 18.04)
      # =========================
      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive

            # 🔥 FIX for Ubuntu 18.04 EOL
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic main restricted universe multiverse' > /etc/apt/sources.list
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic-updates main restricted universe multiverse' >> /etc/apt/sources.list
            echo 'deb http://eu-west-1.ec2.archive.ubuntu.com/ubuntu bionic-security main restricted universe multiverse' >> /etc/apt/sources.list
            
            apt-get update -qq || (sleep 2 && apt-get update -qq)

            apt-get install -y --no-install-recommends --fix-missing \
              build-essential \
              ca-certificates \
              zlib1g-dev \
              git \
              cmake \
              wget \
              xz-utils \
              perl

            update-ca-certificates

            # ===== build static openssl 3.0.15 =====
            cd /tmp
            wget https://www.openssl.org/source/openssl-3.0.15.tar.gz
            tar -xzf openssl-3.0.15.tar.gz
            cd openssl-3.0.15
            
            ./Configure linux-x86_64 no-shared \
              --prefix=/usr/local/openssl-static \
              --openssldir=/usr/local/openssl-static/ssl
            
            make -j$(nproc)
            make install

            # ===== build static curl 8.7.1 (linked with new openssl) =====
            cd /tmp
            wget https://curl.se/download/curl-8.7.1.tar.xz
            tar -xf curl-8.7.1.tar.xz
            cd curl-8.7.1
            
            export PKG_CONFIG_PATH=/usr/local/openssl-static/lib64/pkgconfig:$PKG_CONFIG_PATH
            
            ./configure \
              --disable-shared \
              --enable-static \
              --with-openssl=/usr/local/openssl-static \
              --with-ca-path=/etc/ssl/certs \
              --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
              --prefix=/usr/local/curl-static \
              LDFLAGS='-L/usr/local/openssl-static/lib64' \
              CPPFLAGS='-I/usr/local/openssl-static/include'
            
            make -j$(nproc)
            make install

            # ===== build cJSON (STATIC) =====
            cd /tmp
            git clone --depth 1 --branch v1.7.15 https://github.com/DaveGamble/cJSON.git
            cd cJSON
            mkdir build && cd build

            cmake .. \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON

            make
            make install
            ldconfig

            # ===== build tg-bot =====
            cd /app

            # 👇 Полностью статическая линковка
            make LDFLAGS='-L/usr/local/curl-static/lib -L/usr/local/openssl-static/lib64 -Wl,-Bstatic -lcjson -lcurl -lssl -lcrypto -Wl,-Bdynamic -lz -lpthread -ldl' \
                 CFLAGS='-Iinclude -I/usr/local/curl-static/include'

            chmod +x tg-bot || true

            echo '[OK] build complete'

            echo '[DEBUG] contents of /app:'
            ls -l /app
          "

      # ==================================================================================
      # DEBUG (NOTE: ls, file and du in Ubuntu 22.04 runtime, ldd in Ubuntu 18.04 runtime)
      # ==================================================================================
      - name: Debug build output
        run: |
          echo '=== ls ==='
          ls -l

          echo '=== file ==='
          file tg-bot || true

          echo '=== size ==='
          du -h tg-bot

      - name: Runtime check in Ubuntu 18.04
        run: |
          docker run --rm -v $PWD:/app -w /app ubuntu:18.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive

            apt-get update -qq
            # 👇 Только zlib нужен — всё остальное внутри бинарника
            apt-get install -y zlib1g

            echo '=== ldd ==='
            ldd ./tg-bot

            if ldd ./tg-bot | grep -q 'not found'; then
              echo 'ERROR: missing shared libraries'
              exit 1
            fi

            echo '=== runtime test ==='
            ./tg-bot --version
          "
          
      # =========================
      # VALIDATION
      # =========================
      - name: Ensure binary exists
        run: |
          if [ ! -f tg-bot ]; then
            echo "ERROR: tg-bot not built"
            exit 1
          fi

      # =========================
      # SMOKE TESTS
      # =========================
      - name: Run version
        run: ./tg-bot --version

      - name: Run help
        run: ./tg-bot --help

      - name: Run without config (should fail)
        run: |
          if ./tg-bot 2>/dev/null; then
            echo "ERROR: bot should not start without config"
            exit 1
          else
            echo "OK"
          fi

      - name: Run with fake config
        run: |
          rm -f test.conf test.log

          echo "TOKEN=TEST" >> test.conf
          echo "CHAT_ID=123" >> test.conf
          echo "LOG_FILE=./test.log" >> test.conf
          echo "POLL_TIMEOUT=1" >> test.conf
          echo "TOKEN_TTL=10" >> test.conf

          timeout 3s ./tg-bot -c test.conf || echo "bot exited (expected or timeout)"

      - name: Check log file created
        run: |
          if [ ! -f test.log ]; then
            echo "ERROR: log file not created"
            exit 1
          else
            echo "OK: log file exists"
          fi

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: tg-bot-static
          path: tg-bot
