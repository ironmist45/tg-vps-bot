# =========================================================
# tg-bot configuration file
# =========================================================
#
# Telegram VPS monitoring bot
#
# Author:  dedoverde AKA ironmist45
# Year:    2026
# Version: 1.2.6 (Orion)
#
# ---------------------------------------------------------
# FORMAT
# ---------------------------------------------------------
# - Each line: KEY=VALUE
# - Spaces around '=' are allowed
# - Empty lines are ignored
# - Lines starting with '#' are comments
#
# - Keys are CASE-INSENSITIVE:
#     token, TOKEN, Token — all equivalent
#
# - Unknown keys are ignored (with debug log)
#
# ---------------------------------------------------------
# REQUIRED PARAMETERS
# ---------------------------------------------------------
# TOKEN     - Telegram bot token (from BotFather)
# CHAT_ID   - Allowed Telegram chat ID
#
# ---------------------------------------------------------
# OPTIONAL PARAMETERS
# ---------------------------------------------------------
# TOKEN_TTL     - Confirmation token lifetime (seconds)
#                 Used for /reboot and /restart when TOTP is disabled
#                 Default: 60
#
# LOG_FILE      - Path to log file
#                 Default: /var/log/tg-bot.log
#
# LOG_LEVEL     - Logging verbosity level
#                 Available values:
#                   ERROR   - only critical errors
#                   WARN    - warnings + errors
#                   INFO    - normal operation logs (default)
#                   DEBUG   - full debug output for troubleshooting
#
#                 Default: INFO
#
# TOTP_SECRET   - Base32-encoded TOTP secret for 2FA (optional)
#
#                 When set, /reboot and /restart require a time-based
#                 one-time code from Google Authenticator, Aegis, Authy
#                 or any RFC 6238 compatible app.
#
#                 When empty or not set, classic stateless token flow
#                 is used (backward compatible).
#
#                 To generate a secret use one of the following options:
#                   1. python3 -c "import base64, os; print(base64.b32encode(os.urandom(20)).decode())"
#                   2. openssl rand 20 | base32
#                   3. head -c 20 /dev/urandom | base32
#
#                 To get the import link for your authenticator app:
#                   1. Add TOTP_SECRET and set TOTP_SETUP=enabled
#                   2. Reload config: kill -HUP $(pidof tg-bot)
#                   3. Send /totp_setup to the bot
#                   4. Import the link into your app
#                   5. Set TOTP_SETUP=disabled and reload config
#
#                 Example:
#                   TOTP_SECRET=JBSWY3DPEHPK3PXP
#
#                 Default: disabled
#
# TOTP_SETUP    - Controls /totp_setup command visibility (optional)
#
#                 enabled  - /totp_setup shows the secret and import link
#                            Use only during initial authenticator setup
#
#                 disabled - /totp_setup returns "Setup is disabled"
#                            Safe default — prevents secret exposure
#                            after initial setup is complete
#
#                 Default: disabled
#
# UPLOAD_DIR    - Directory where files sent to the bot are saved (optional)
#
#                 Files received via Telegram are saved here with sanitized
#                 filenames. The directory must exist and be writable by
#                 the tg-bot user before sending any files.
#
#                 Create the directory before starting the bot:
#                   sudo mkdir -p /var/www/html/uploads
#                   sudo chown tg-bot:tg-bot /var/www/html/uploads
#
#                 Designed to work with lighttpd as document root so
#                 uploaded files are accessible via HTTP once lighttpd
#                 is configured.
#
#                 Telegram file size limit: 20 MB per file.
#
#                 Default: /var/www/html/uploads
#
# ---------------------------------------------------------
# SYSTEM PATHS (optional, defaults provided for Ubuntu/Debian)
# ---------------------------------------------------------
# SUDO_PATH         - Path to sudo binary
#                     Default: /usr/bin/sudo
#
# SYSTEMCTL_PATH    - Path to systemctl binary
#                     Default: /bin/systemctl
#
# JOURNALCTL_PATH   - Path to journalctl binary
#                     Default: /bin/journalctl
#
# F2B_WRAPPER_PATH  - Path to f2b-wrapper binary
#                     Default: /usr/local/bin/f2b-wrapper
#
# =========================================================

# ===== Telegram =====
TOKEN=your_bot_token_here
CHAT_ID=123456789

# ===== Bot =====
TOKEN_TTL=60

# ===== TOTP 2FA (optional) =====
# Step 1: generate a secret (choose one):
#   python3 -c "import base64, os; print(base64.b32encode(os.urandom(20)).decode())"
#   openssl rand 20 | base32
# Step 2: paste the secret below and set TOTP_SETUP=enabled
# Step 3: reload config and send /totp_setup to get the import link
# Step 4: add to your app, then set TOTP_SETUP=disabled and reload
# TOTP_SECRET=YOUR_BASE32_SECRET_HERE
# TOTP_SETUP=enabled

# ===== Logging =====
LOG_FILE=/var/log/tg-bot.log
LOG_LEVEL=INFO

# ===== File uploads (optional) =====
# Directory where files sent to the bot are saved.
# Must exist and be writable by tg-bot user:
#   sudo mkdir -p /var/www/html/uploads
#   sudo chown tg-bot:tg-bot /var/www/html/uploads
# UPLOAD_DIR=/var/www/html/uploads

# ===== System paths (uncomment to override defaults) =====
# SUDO_PATH=/usr/bin/sudo
# SYSTEMCTL_PATH=/bin/systemctl
# JOURNALCTL_PATH=/bin/journalctl
# F2B_WRAPPER_PATH=/usr/local/bin/f2b-wrapper
